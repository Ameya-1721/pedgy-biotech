name: Content Update Automation

on:
  issues:
    types: [labeled]

jobs:
  update-content:
    if: contains(github.event.issue.labels.*.name, 'approved')
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: dev-ameya

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Script
        run: python .github/scripts/content-update.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          branch: pb-feature-issue-${{ github.event.issue.number }}
          base: dev-ameya
          title: "Content Update (Issue #${{ github.event.issue.number }})"
          body: "Automated content update from Issue #${{ github.event.issue.number }}"